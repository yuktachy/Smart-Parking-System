<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartPark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <nav class="nav-header" data-testid="main-navigation">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.75rem;">
                    <i class="fas fa-parking"></i><span>SMARTPARK</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html" data-testid="register-link">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card" data-testid="login-form">
            <div class="auth-header">
                <div class="auth-icon"><i class="fas fa-shield-halved"></i></div>
                <h1>Welcome Back</h1>
                <p>Sign in to your SmartPark account</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" data-testid="login-email-input" placeholder="your@email.com" required class="auth-input">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" data-testid="login-password-input" placeholder="Enter password" required class="auth-input">
                </div>

                <div id="errorMessage" data-testid="login-error" class="error-message" style="display:none;"></div>

                <button type="submit" class="auth-btn" data-testid="login-submit-button">
                    <i class="fas fa-sign-in-alt"></i> SIGN IN
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html" data-testid="goto-register-link">Create one</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');

                localStorage.setItem('user', JSON.stringify(data));
                window.location.href = 'booking.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            }
        }

        // Check if already logged in
        fetch(`${API_URL}/api/auth/me`, {credentials: 'include'})
            .then(r => r.ok ? r.json() : null)
            .then(user => { if (user && !user.error) window.location.href = 'booking.html'; });
    </script>
</body>
</html>
